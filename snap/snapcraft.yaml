name: qalculate
title: Qalculate!
version: '5.12.0'
license: GPL-2.0+
summary: The ultimate desktop calculator
description: |
  Qalculate! is a multi-purpose cross-platform desktop calculator. It is simple
  to use but provides power and versatility normally reserved for complicated
  math packages, as well as useful tools for everyday needs (such as currency
  conversion and percent calculation). Features include a large library of
  customizable functions, unit calculations and conversion, physical constants,
  symbolic calculations (including integrals and equations), arbitrary precision,
  uncertainty propagation, interval arithmetic, plotting, and a user-friendly
  interface.

grade: stable
confinement: strict
base: core24

compression: lzo

slots:
  dbus-qalculate:
    interface: dbus
    name: io.github.Qalculate
    bus: session

apps:
  qalc:
    extensions:
      - gnome
    command: usr/bin/qalc
    environment:
        GNUPLOT_DRIVER_DIR: "$SNAP/usr/libexec/gnuplot/6.0"
    plugs:
      - network
  qalculate:
    extensions:
      - gnome
    command: usr/bin/qalculate-gtk
    environment:
        GNUPLOT_DRIVER_DIR: "$SNAP/usr/libexec/gnuplot/6.0"
    plugs:
      - home
      - network
  gtk:  # old variant of the above
    extensions:
      - gnome
    command: usr/bin/qalculate-gtk
    environment:
        GNUPLOT_DRIVER_DIR: "$SNAP/usr/libexec/gnuplot/6.0"
    plugs:
      - home
      - network
  gnuplot:
    extensions:
      - gnome
    command: usr/bin/gnuplot
    environment:
        GNUPLOT_DRIVER_DIR: "$SNAP/usr/libexec/gnuplot/6.0"

parts:
  libqalculate:
    source: https://github.com/Qalculate/libqalculate.git
    source-tag: v5.12.0
    source-depth: 1
    plugin: autotools
    autotools-configure-parameters:
      - --prefix=/usr
    build-environment:
      - CXXFLAGS: -O2 -fsigned-char
    build-packages:
      - libncurses5-dev
      - libreadline-dev
      - libcurl4-gnutls-dev
      - libicu-dev
      - libxml2-dev
      - libgmp-dev
      - libmpfr-dev
      - doxygen
      - pkg-config
    stage-packages:
      - libmpfr6
      - libgmp10
    override-build: |
      patch -p1 < $CRAFT_STAGE/patches/lib/snap-path.patch
      ./autogen.sh
      craftctl default
      echo Stripping qalc
      strip $CRAFT_PART_INSTALL/usr/bin/qalc
    after:
      - patches
    prime:
      - -include
      - -lib/pkgconfig
      - -lib/*.a
      - -share/doc
      - -usr/share/doc
      - -usr/share/lintian

  qalculate-gtk:
    source: https://github.com/Qalculate/qalculate-gtk.git
    source-tag: v5.12.0
    source-depth: 1
    plugin: autotools
    autotools-configure-parameters:
      - --with-webkitgtk=4.1
      - --disable-gnome-search
      - --prefix=/usr
    build-environment:
      - CXXFLAGS: -O2 -fsigned-char
    organize:
      snap/qalculate/current/usr: usr
    build-packages:
      - libgmp-dev
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - libxml2-dev
      - intltool
    override-build: |
      patch -p1 < $CRAFT_STAGE/patches/gui/snap-help.patch
      ./autogen.sh
      craftctl default
      echo Stripping qalculate-gtk
      strip $CRAFT_PART_INSTALL/usr/bin/qalculate-gtk
    after:
      - libqalculate
      - patches
    prime:
      - -share/applications

  gnuplot:
    source: https://downloads.sourceforge.net/gnuplot/gnuplot-6.0.4.tar.gz
    source-checksum: sha256/458d94769625e73d5f6232500f49cbadcb2b183380d43d2266a0f9701aeb9c5b
    plugin: autotools
    autotools-configure-parameters:
      - --prefix=/usr
      - --without-gd
      - --without-libcerf
      - --without-lua
      - --with-readline=gnu
      - --without-qt
      - --enable-wxwidgets
    after:
      - wxwidgets-sdk
    prime:
      - -share/applications
      - -share/doc
      - -share/man
    override-build: |
      craftctl default
      echo Stripping gnuplot
      strip $CRAFT_PART_INSTALL/usr/bin/gnuplot

  wxwidgets-sdk:
    source: https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.11/wxWidgets-3.2.11.tar.bz2
    source-checksum: sha256/6a129015bce2e914e4bf61ec4411854ad962801d47e92f2eb8340adb6a90af08
    plugin: autotools
    autotools-configure-parameters:
      - --enable-shared
      - --disable-aui
      - --disable-html
      - --disable-mdi
      - --disable-mediactrl
      - --disable-propgrid
      - --disable-ribbon
      - --disable-richtext
      - --disable-webview
      - --disable-xrc
      - --with-gtk=3
      - --without-opengl
      - --without-libnotify
      - --with-libjpeg
      - --with-libpng
      - --with-zlib
      - --prefix=/usr
    organize:
      snap/qalculate/current/usr: usr
    build-packages:
      - gcc
      - g++
      - gettext
      - libcairo2-dev
      - libexpat1-dev
      - libgtk-3-dev
      - libjpeg-dev
      - libpng-dev
      - libsecret-1-dev
      - libtiff5-dev
      - libxtst-dev
      - zlib1g-dev
    override-build: |
      set \
        -o errexit \
        -o nounset;
      craftctl default;
      # Fix-up wx-config link
      ln \
        --force \
        --relative \
        --symbolic \
        "${CRAFT_PART_INSTALL}"/usr/lib/wx/config/* \
        "${CRAFT_PART_INSTALL}"/usr/bin/wx-config;
      # Fix-up installation prefix
      # command line - How to use sed to replace only the first occurrence in a file? - Stack Overflow
      # https://stackoverflow.com/questions/148451/how-to-use-sed-to-replace-only-the-first-occurrence-in-a-file
      sed \
        --follow-symlinks \
        --in-place \
        "0,/^prefix=.*\$/ s##prefix=\"${SNAPCRAFT_STAGE}\"/usr#" \
        "${CRAFT_PART_INSTALL}"/usr/bin/wx-config;
    prime:
      - usr/lib/libwx_baseu-*
      - usr/lib/libwx-baseu_xml*
      - usr/lib/libwx_gtk3u_core*
      - usr/lib/libwx_gtk3u_adv*

  patches:
    source: patches
    plugin: dump
    organize:
      "*": patches/
    prime:
      - -*

